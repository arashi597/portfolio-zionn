<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zion Profile</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --color1:#6a5cff;
  --color2:#a855f7;
  --color3:#22c55e;
  --bg-image:none;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Segoe UI;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:white;
  background:#0b1020;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:-50%;
  background:conic-gradient(#6a5cff,#a855f7,#22c55e,#06b6d4,#f97316,#6a5cff);
  filter:blur(120px);
  opacity:.6;
  animation:spin 20s linear infinite;
  z-index:0;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:var(--bg-image) center/cover no-repeat;
  opacity:.25;
  z-index:0;
}

@keyframes spin{100%{transform:rotate(360deg)}}

#stars{
  position:fixed;
  inset:0;
  z-index:1;
}

/* CARD */
.card{
  margin-top:40px;
  width:340px;
  background:rgba(17,24,39,.7);
  backdrop-filter:blur(14px);
  border-radius:22px;
  text-align:center;
  z-index:2;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.cover{
  height:120px;
  background:linear-gradient(120deg,#6a5cff,#a855f7,#22c55e);
  background-size:200% 200%;
  animation:move 6s infinite;
}

@keyframes move{
  0%{background-position:0 50%}
  50%{background-position:100% 50%}
  100%{background-position:0 50%}
}

.profile{
  width:120px;
  height:120px;
  margin:-60px auto 10px;
  border-radius:50%;
  position:relative;
}

.profile img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #111827;
}

.badge{
  position:absolute;
  bottom:-6px;
  right:-6px;
  background:#a855f7;
  padding:4px 6px;
  font-size:10px;
  border-radius:10px;
}

button{
  margin:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#a855f7;
  color:white;
  cursor:pointer;
}

.name{font-size:22px}
.role{color:#a855f7;font-weight:bold}
.tagline{color:#22c55e}
.bio{font-size:13px;color:#cbd5e1;margin:10px}

.socials a{
  color:white;
  margin:0 6px;
  font-size:18px;
}

.links a{
  display:inline-block;
  margin:4px;
  padding:6px 10px;
  background:#1f2937;
  color:white;
  border-radius:8px;
  text-decoration:none;
}

.clock{font-size:13px;color:#cbd5e1}

/* DOGS */
.dogs{
  width:340px;
  margin-top:20px;
  z-index:2;
}

.dog-list{
  max-height:260px;
  overflow-y:auto;
  padding:10px;
  background:rgba(0,0,0,.2);
  border-radius:12px;
  font-size:13px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="card">

  <div class="cover"></div>

  <div class="profile">
    <img id="avatar">
    <div class="badge">ZION GOD</div>
  </div>

  <input type="file" id="upload" hidden>
  <button onclick="upload.click()">Change Profile Photo</button>

  <div id="greet"></div>

  <div class="name">Zion</div>
  <div class="role">ZION • DEVELOPER</div>

  <div class="bio">
    I love music and coding creating different world.
  </div>

  <div class="tagline">Create your own reality.</div>

  <div class="socials">
    <a href="https://github.com/arashi597"><i class="fab fa-github"></i></a>
    <a href="https://www.facebook.com/share/1Cv7Q153bW/"><i class="fab fa-facebook"></i></a>
    <a href="https://www.instagram.com/zion_on_top?igsh=MTdqanB2ZG1yb3V6"><i class="fab fa-instagram"></i></a>

  <div class="links">
    <a href="https://github.com/arashi597">GitHub</a>
    <a href="https://www.facebook.com/share/1Cv7Q153bW/">Facebook</a>

</body>
</html>
